# LANG
#LC_ALL = "en_US.UTF-8"
#LANG = en_US.UTF-8
#LANGUAGE = en_US
#LC_CTYPE = zh_CN.UTF-8

# Electron use kio instead
ELECTRON_TRASH = kioclient5
# Java stuffs
JAVA_HOME = /usr/lib/jvm/default

# Scale
PLASMA_USE_QT_SCALING = 1
QT_AUTO_SCREEN_SCALE_FACTOR = 1
GDK_DPI_SCALE = 1.15

#Fcitx 5
INPUT_METHOD = fcitx5
GTK_IM_MODULE = fcitx5
QT_IM_MODULE = fcitx5
XMODIFIERS = \@im=fcitx5

#VA-API
LIBVA_DRIVER_NAME = iHD
#VDPAU-VA-GL
VDPAU_DRIVER = nvidia

# Firefox VAAPI
MOZ_WEBRENDER = 1
MOZ_X11_EGL = 1

#SSH
SSH_AUTH_SOCK = ${SSH_AUTH_SOCK:-"${XDG_RUNTIME_DIR}/gnupg/S.gpg-agent.ssh"}

#Editor
EDITOR = vim

TERMINAL = alacritty
